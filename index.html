<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Nomos is the AI agentic IDE for teams building software end to end, with integrated dashboard, billing, and Supabase-backed accounts."
    />
    <meta
      name="keywords"
      content="Nomos, AI IDE, agentic IDE, software builder, dashboard, billing, Supabase"
    />
    <meta property="og:title" content="Nomos | The AI agentic IDE for teams" />
    <meta
      property="og:description"
      content="Nomos brings planning, coding, billing, and account operations into one AI-native software builder."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Nomos | The AI agentic IDE for teams" />
    <meta
      property="twitter:description"
      content="Nomos brings planning, coding, billing, and account operations into one AI-native software builder."
    />
    <title>Nomos | The AI agentic IDE for teams</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
